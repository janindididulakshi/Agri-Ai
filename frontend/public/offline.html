<!DOCTYPE html>
<html lang="si">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Smart Farm AI</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: #0a1a0b;
        color: #e8f5e9;
      }
      .card {
        padding: 24px;
        border-radius: 16px;
        background: #1a3a1b;
        max-width: 420px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size: 48px">🌾</div>
      <h1 style="font-size: 18px">අන්තර්ජාල සබඳතාව නැත</h1>
      <p style="opacity: 0.85">කරුණාකර නැවත සබැඳුණ පසු උත්සාහ කරන්න.</p>
    </div>
  </body>
</html>
